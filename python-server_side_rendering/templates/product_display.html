<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Product Display</title>
</head>
<body>
    {% include "header.html" %}
    <main>
        <h1>Product Display</h1>
        {% if error %}
        <p>{{ error }}</p>
        {% else %}
        <table border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr>
                    <td>{{ product.name }}</td>
                    <td>{{ product.category }}</td>
                    <td>{{ "%.2f"|format(product.price) }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% endif %}
    </main>
    {% include "footer.html" %}
</body>
</html>
